name: 🧪 Manual Intelligence Test Update

on:
  # Manual trigger từ GitHub Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (không commit/push)?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  manual-update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 📦 Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 👀 Show test information
        run: |
          echo "=== AutoSQLi Intelligence Manual Test ==="
          echo "Python version:"
          python --version
          echo ""
          echo "Installed packages:"
          pip list | grep -E "requests|schedule"
      
      - name: 🧠 Run Intelligence Update (Test)
        run: |
          echo "Starting intelligence update test..."
          python main.py --update-database
          echo ""
          echo "Update completed!"
      
      - name: 📊 Show database status
        run: |
          echo "=== Payload Database Status ==="
          python main.py --update-status
      
      - name: 📈 Check payload changes
        run: |
          echo "=== Changed Files ==="
          git diff --name-only || echo "No changes"
      
      - name: 💾 Commit changes (if not dry run)
        if: github.event.inputs.dry_run == 'false'
        run: |
          git config --global user.name "AutoSQLi-Bot"
          git config --global user.email "autosqli-bot@github.com"
          git add data/payloads*.json
          git commit -m "🧪 Test: Manual intelligence update" || echo "Nothing to commit"
      
      - name: 🚀 Push changes (if not dry run)
        if: github.event.inputs.dry_run == 'false'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
      
      - name: 📝 Test summary
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "### ✅ Test Run (Dry Run - No Changes Pushed)"
          echo "This was a test run. No commits were made."
          echo "To actually update, run with dry_run=false"
